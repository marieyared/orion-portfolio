name = "orion-ai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Run locally with: wrangler dev --port 8788
# (port 8787 is taken by the Python ISIN API — orion_api.py)
#
# ANTHROPIC_API_KEY must be set as a secret:
#   Production:  wrangler secret put ANTHROPIC_API_KEY
#   Local dev:   copy .dev.vars.example → .dev.vars and fill in your key
